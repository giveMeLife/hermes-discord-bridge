name: discord-bridge
version: 1.1.0
description: "Send clarify questions to Discord for remote approval when bridge mode is active. Each CLI session gets its own Discord thread — supports multiple concurrent sessions."
author: "@giveMeLife"
hooks:
  - on_clarify
  - on_clarify_response
requires_env:
  - DISCORD_BOT_TOKEN
  - DISCORD_HOME_CHANNEL
