name: discord-bridge
version: 1.3.0
description: "Send clarify questions and arbitrary messages to Discord for remote approval and progress updates. Each CLI session gets its own Discord thread — supports multiple concurrent sessions."
author: "@giveMeLife"
hooks:
  - on_clarify
  - on_clarify_response
requires_env:
  - DISCORD_BOT_TOKEN
  - DISCORD_HOME_CHANNEL
